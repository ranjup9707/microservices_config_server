server:
  port: 9201

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/db1
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8000/eureka/
    register-with-eureka: true
    fetch-registry: true

    healthcheck:
      enabled: true

management:
  endpoints:
    web:
      exposure:
        include: "*"

  endpoint:
    health:
      show-details: always

resilience4j:
  circuitbreaker:
    instances:
      courseService:
        sliding-window-size: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 2

  retry:
    instances:
      courseServiceRetry:
        max-attempts: 3
        wait-duration: 2s

  timelimiter:
    instances:
      courseServiceTimeLimiter:
        timeout-duration: 2s

  ratelimiter:
    instances:
      courseServiceRateLimiter:
        limit-for-period: 2 #Only 3 request allowed
        limit-refresh-period: 30s #Reset count of limit for period as 0 after 10 secs
        timeout-duration: 0s

logging:
  level:
    io.github.resilience4j.retry: DEBUG
