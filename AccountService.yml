spring:
  application:
    name: AccountService
  datasource:
    url: jdbc:mysql://localhost:3306/test1
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: update

eureka:
  client:
    service-url:
      defaultZone:
        http://localhost:8000/eureka
  instance:
    hostname: localhost
    instance-id: ${spring.application.name}:${random.value}

management:
  endpoints:
    web:
      exposure:
        include: health, info, refresh


server:
  port: 9001

config:
  message: "AccountService"
