server:
  port: ${SERVER_PORT:9002}
  
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/db2
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8000/eureka/
    register-with-eureka: true
    fetch-registry: true

    healthcheck:
      enabled: true

  instance:
    instance-id: ${spring.application.name}:${server.port}



management:
  endpoints:
    web:
      exposure:
        include: health, info

  endpoint:
    health:
      show-details: always


